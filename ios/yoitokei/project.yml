name: YoiTokei
options:
  bundleIdPrefix: jp.ryoku
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
targets:
  YoiTokei:
    type: application
    platform: iOS
    sources:
      - YoiTokei
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.ryoku.yoitokei
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: よい時計
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
