<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>ノリ打ち精算</title><style>:root{--bg:#101118;--card:#1b1d27;--line:#303442;--text:#f7f7fb;--muted:#9ba0af;--accent:#ffd23f;--good:#55d68c;--bad:#ff6875}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif}header{position:sticky;top:0;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:16px;background:#101118e8;border-bottom:1px solid var(--line)}h1{font-size:1.35rem;margin:0}.ver{font-size:.72rem;color:var(--muted)}main{max-width:760px;margin:auto;padding:14px 14px 40px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}label{display:grid;gap:6px;color:var(--muted);font-size:.78rem;font-weight:700}input,select,button{font:inherit}input,select{width:100%;padding:11px;border:1px solid var(--line);border-radius:11px;background:#242733;color:var(--text)}button{border:0;border-radius:13px;padding:12px;cursor:pointer}.primary{width:100%;font-weight:900;background:linear-gradient(90deg,var(--accent),#ff963e);color:#181818}.secondary{background:#292c38;color:var(--text);border:1px solid var(--line)}.members{display:grid;gap:8px}.member{display:grid;grid-template-columns:1.15fr 1fr 1fr .75fr;gap:7px;align-items:end;padding:10px;border:1px solid var(--line);border-radius:14px}.member span{font-size:.68rem;color:var(--muted)}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.summary div{text-align:center;padding:10px;background:#242733;border-radius:12px}.summary small{display:block;color:var(--muted)}.summary strong{display:block;margin-top:4px}.result{display:grid;gap:8px;margin-top:12px}.pay{display:flex;justify-content:space-between;padding:13px;border-radius:12px;background:#242733;border-left:4px solid var(--accent)}.pay b{color:var(--accent)}.row{display:flex;gap:8px}.row button{flex:1}.hidden{display:none}.history{display:grid;gap:8px}.history article{padding:12px;background:#242733;border-radius:12px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.tab.active{background:var(--accent);color:#111;font-weight:900}.good{color:var(--good)}.bad{color:var(--bad)}@media(max-width:560px){.member{grid-template-columns:1fr 1fr}.member .name{grid-column:1/-1}}</style></head><body><header><h1>ノリ打ち精算</h1><span class="ver">v1.0.1</span></header><main><div class="tabs"><button class="tab active" data-tab="calc">精算</button><button class="tab secondary" data-tab="history">履歴</button></div><section id="calc"><div class="card grid"><label>人数<select id="count"></select></label><label>計算方式<select id="mode"><option value="equal">完全均等</option><option value="investment">投資比率</option><option value="custom">自由配分</option></select></label><label>端数<select id="unit"><option value="1">1円</option><option value="10">10円</option><option value="100" selected>100円</option><option value="1000">1,000円</option></select></label><label>玉・メダル換算額<input id="rate" type="number" value="0" step="0.01"></label></div><div class="card"><h2>メンバー</h2><div id="members" class="members"></div></div><div class="summary card"><div><small>総投資</small><strong id="ti">0円</strong></div><div><small>総回収</small><strong id="tr">0円</strong></div><div><small>総収支</small><strong id="tp">0円</strong></div></div><button id="calcBtn" class="primary">精算を計算</button><div id="resultCard" class="card hidden"><div class="row"><button id="copy" class="secondary">結果をコピー</button><button id="save" class="secondary">履歴に保存</button></div><div id="result" class="result"></div></div></section><section id="history" class="hidden"><div class="card"><h2>履歴</h2><div id="historyList" class="history"></div></div></section></main><script>const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],K='noriuchi_apps_v1';let members=[],last=null;const yen=n=>Math.round(n).toLocaleString('ja-JP')+'円';for(let i=2;i<=10;i++)$('#count').insertAdjacentHTML('beforeend',`<option ${i===3?'selected':''}>${i}</option>`);function make(n){members=Array.from({length:n},(_,i)=>members[i]||{name:String.fromCharCode(65+i),inv:0,ret:0,balls:0,w:1});render()}function render(){$('#members').innerHTML=members.map((m,i)=>`<div class="member" data-i="${i}"><label class="name"><span>名前</span><input data-f="name" value="${m.name}"></label><label><span>投資</span><input data-f="inv" type="number" value="${m.inv||''}"></label><label><span>回収</span><input data-f="ret" type="number" value="${m.ret||''}"></label><label><span>玉/枚</span><input data-f="balls" type="number" value="${m.balls||''}"></label>${$('#mode').value==='custom'?`<label><span>配分</span><input data-f="w" type="number" value="${m.w}"></label>`:''}</div>`).join('');$$('[data-f]').forEach(e=>e.oninput=()=>{let i=+e.closest('[data-i]').dataset.i,f=e.dataset.f;members[i][f]=f==='name'?e.value:+e.value||0;totals()});totals()}function totals(){let rate=+$('#rate').value||0,ti=members.reduce((s,m)=>s+m.inv,0),tr=members.reduce((s,m)=>s+m.ret+m.balls*rate,0),tp=tr-ti;$('#ti').textContent=yen(ti);$('#tr').textContent=yen(tr);$('#tp').textContent=yen(tp);$('#tp').className=tp>=0?'good':'bad'}function calculate(){let rate=+$('#rate').value||0,unit=+$('#unit').value,mode=$('#mode').value,totalInv=members.reduce((s,m)=>s+m.inv,0),totalRet=members.reduce((s,m)=>s+m.ret+m.balls*rate,0),profit=totalRet-totalInv,weights;if(mode==='investment'){weights=totalInv?members.map(m=>m.inv/totalInv):members.map(()=>1/members.length)}else if(mode==='custom'){let sw=members.reduce((s,m)=>s+Math.max(0,m.w),0);weights=sw?members.map(m=>Math.max(0,m.w)/sw):members.map(()=>1/members.length)}else weights=members.map(()=>1/members.length);let bal=members.map((m,i)=>({name:m.name,b:(m.ret+m.balls*rate-m.inv)-profit*weights[i]}));bal.forEach(x=>x.b=Math.round(x.b/unit)*unit);let drift=bal.reduce((s,x)=>s+x.b,0);if(drift)bal.sort((a,b)=>Math.abs(b.b)-Math.abs(a.b))[0].b-=drift;let cr=bal.filter(x=>x.b>0).map(x=>({...x})),db=bal.filter(x=>x.b<0).map(x=>({...x})),tx=[];let i=0,j=0;while(i<db.length&&j<cr.length){let a=Math.min(-db[i].b,cr[j].b);if(a)tx.push({from:db[i].name,to:cr[j].name,amount:a});db[i].b+=a;cr[j].b-=a;if(!db[i].b)i++;if(!cr[j].b)j++}last={totalInv,totalRet,profit,tx,date:new Date().toISOString()};$('#result').innerHTML=tx.length?tx.map(t=>`<div class="pay"><span>${t.from} → ${t.to}</span><b>${yen(t.amount)}</b></div>`).join(''):'<div class="pay"><span>送金なし</span><b>精算完了</b></div>';$('#resultCard').classList.remove('hidden')}function text(){return['【ノリ打ち精算】',`総投資：${yen(last.totalInv)}`,`総回収：${yen(last.totalRet)}`,`総収支：${yen(last.profit)}`,'',...(last.tx.length?last.tx.map(t=>`${t.from} → ${t.to} ${yen(t.amount)}`):['送金なし'])].join('\n')}function histories(){let h=JSON.parse(localStorage.getItem(K)||'[]');$('#historyList').innerHTML=h.length?h.map(x=>`<article><b>${new Date(x.date).toLocaleString('ja-JP')}</b><p class="${x.profit>=0?'good':'bad'}">${yen(x.profit)}</p></article>`).join(''):'履歴はありません'}$('#count').onchange=e=>make(+e.target.value);$('#mode').onchange=render;$('#rate').oninput=totals;$('#calcBtn').onclick=calculate;$('#copy').onclick=()=>navigator.clipboard.writeText(text());$('#save').onclick=()=>{let h=JSON.parse(localStorage.getItem(K)||'[]');h.unshift(last);localStorage.setItem(K,JSON.stringify(h));histories()};$$('.tab').forEach(b=>b.onclick=()=>{$$('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('#calc').classList.toggle('hidden',b.dataset.tab!=='calc');$('#history').classList.toggle('hidden',b.dataset.tab!=='history');histories()});make(3);histories()</script></body></html>
