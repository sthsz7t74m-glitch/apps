<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#e9dfc8"><title>理科ホワイトボード</title><style>:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#20302b;background:#d9d0ba;--ink:#24483d;--red:#c84b45;--blue:#326da8;--board:#fbfaf4;--line:#d8d3c5}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100dvh;background:linear-gradient(135deg,#d7ceb7,#eee8d9)}button,select{font:inherit}.app{width:min(100%,820px);margin:auto;padding:max(14px,env(safe-area-inset-top)) 13px calc(88px + env(safe-area-inset-bottom))}.top{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px}.top h1{margin:0;font-size:27px;letter-spacing:-.04em}.top p{margin:4px 0 0;color:#64736d;font-size:12px}.ver{font-size:10px;background:#28483e;color:white;border-radius:999px;padding:5px 8px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.stat{background:#f8f5eb;border:1px solid #c8c1af;border-radius:15px;padding:10px;text-align:center}.stat b{display:block;font-size:18px;color:var(--ink)}.stat span{font-size:10px;color:#6b7772}.hero{background:#28483e;color:white;border-radius:20px;padding:16px;box-shadow:0 8px 24px #55685d33}.hero h2{margin:0 0 5px;font-size:19px}.hero p{margin:0;color:#d5e4df;font-size:13px;line-height:1.55}.heroBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:13px}.btn{border:0;border-radius:13px;padding:12px;font-weight:800}.primary{background:#f5cb5c;color:#26322e}.secondary{background:#41665a;color:white;border:1px solid #6c8a80}.head{display:flex;justify-content:space-between;align-items:end;margin:18px 2px 9px}.head h2{font-size:17px;margin:0}.head span{font-size:10px;color:#68736f}.filters{display:flex;gap:6px;overflow:auto;padding-bottom:8px}.chip{border:1px solid #bdb6a5;background:#f7f3e8;color:#576660;border-radius:999px;padding:7px 11px;white-space:nowrap;font-size:11px;font-weight:700}.chip.active{background:#28483e;color:white;border-color:#28483e}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.unit{background:#f8f5eb;border:1px solid #c9c1ae;border-radius:17px;padding:13px;text-align:left;color:inherit;min-height:128px;box-shadow:0 4px 12px #6c645522}.unit .icon{font-size:23px}.unit h3{margin:7px 0 4px;font-size:14px}.unit p{margin:0;color:#68746f;font-size:11px;line-height:1.45}.bar{height:5px;background:#ddd7c7;border-radius:9px;margin-top:10px;overflow:hidden}.bar i{display:block;height:100%;background:#4d8a71}.screen{display:none}.screen.active{display:block}.back{border:0;background:transparent;color:#365f51;font-weight:800;padding:5px 0 11px}.board{background:var(--board);border:10px solid #b8a98b;border-radius:13px;box-shadow:inset 0 0 20px #9d967c22,0 8px 22px #524d4233;padding:18px 17px;min-height:420px;position:relative}.board:after{content:"";position:absolute;left:15%;right:15%;bottom:-15px;height:8px;background:#82765f;border-radius:0 0 8px 8px}.board h2{margin:0;color:var(--ink);font-size:22px;border-bottom:3px solid var(--ink);padding-bottom:6px}.board h3{color:var(--blue);margin:17px 0 6px;font-size:16px}.board p,.board li{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;line-height:1.7;font-size:14px}.board ul{padding-left:20px}.marker{background:linear-gradient(transparent 60%,#ffe48b 60%);font-weight:800}.red{color:var(--red);font-weight:800}.formula{margin:12px 0;padding:10px;border:2px dashed var(--blue);border-radius:8px;text-align:center;color:var(--blue);font-size:17px;font-weight:800}.diagram{white-space:pre-wrap;font-family:ui-monospace,monospace;background:#f0eee5;border-radius:10px;padding:11px;color:#344b43;line-height:1.5}.trend{margin-top:15px;border-left:5px solid var(--red);background:#fff0eb;padding:11px;border-radius:0 10px 10px 0;font-size:12px;line-height:1.55}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:24px}.quiz{background:#f8f5eb;border:1px solid #c9c1ae;border-radius:20px;padding:16px}.meta{display:flex;justify-content:space-between;color:#707b76;font-size:11px}.question{font-size:18px;font-weight:800;line-height:1.55;margin:22px 0}.choices{display:grid;gap:8px}.choice{border:1px solid #bdb6a5;border-radius:13px;padding:12px;background:white;text-align:left;color:#253832}.choice.correct{background:#dff4e8;border-color:#4d9a70}.choice.wrong{background:#ffe1df;border-color:#d85a53}.explain{display:none;margin-top:13px;background:#eee9da;border-radius:12px;padding:12px;line-height:1.6;font-size:13px}.next{display:none;width:100%;margin-top:11px}.tabs{position:fixed;bottom:0;left:0;right:0;background:#f7f3e8ee;backdrop-filter:blur(12px);border-top:1px solid #bbb4a3;padding:7px 8px calc(7px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:5px}.tabs button{border:0;background:transparent;color:#6e7873;padding:8px 15px;border-radius:12px;font-size:11px;font-weight:800}.tabs button.active{background:#28483e;color:white}@media(max-width:420px){.board{padding:15px 13px}.grid{gap:7px}.unit{padding:11px}.tabs button{padding:8px 11px}}</style></head><body><main class="app"><section id="home" class="screen active"><div class="top"><div><h1>理科ホワイトボード</h1><p>中学理科3年間＋高校入試対策</p></div><span class="ver">v1.0.0</span></div><div class="stats"><div class="stat"><b id="learned">0</b><span>学習済み</span></div><div class="stat"><b id="correctRate">0%</b><span>正答率</span></div><div class="stat"><b id="streak">0</b><span>連続正解</span></div></div><div class="hero"><h2>今日のおすすめ</h2><p>ホワイトボード授業で要点を確認して、そのまま入試形式の問題に挑戦しよう。</p><div class="heroBtns"><button class="btn primary" onclick="startRandomLesson()">授業を始める</button><button class="btn secondary" onclick="startExam()">入試演習</button></div></div><div class="head"><h2>単元別教材</h2><span>全12単元</span></div><div class="filters" id="filters"></div><div class="grid" id="units"></div></section><section id="lesson" class="screen"><button class="back" onclick="show('home')">← 単元一覧</button><div class="board" id="board"></div><div class="actions"><button class="btn secondary" onclick="markLearned()">学習済みにする</button><button class="btn primary" onclick="startUnitQuiz()">問題演習へ</button></div></section><section id="quiz" class="screen"><button class="back" onclick="show('home')">← ホーム</button><div class="quiz"><div class="meta"><span id="qType"></span><span id="qCount"></span></div><div class="question" id="question"></div><div class="choices" id="choices"></div><div class="explain" id="explain"></div><button class="btn primary next" id="next" onclick="nextQuestion()">次の問題</button></div></section></main><nav class="tabs"><button class="active" onclick="show('home',this)">単元</button><button onclick="startExam(this)">入試演習</button><button onclick="startWeak(this)">苦手復習</button></nav><script>
const units=[
{id:'light',grade:1,field:'物理',icon:'🔦',title:'光・音・力',desc:'反射・屈折、音、力のはたらき',html:`<h2>光・音・力</h2><h3>光の反射と屈折</h3><p>反射では<span class="marker">入射角＝反射角</span>。角度は鏡ではなく、鏡に垂直な線（法線）から測る。</p><div class="diagram">入射光 ↘ ｜法線｜ ↗ 反射光<br>　　　　　──鏡──</div><p>空気からガラスへ進むと光は法線側へ、ガラスから空気へ進むと法線から離れる。</p><h3>音</h3><p>音の高さは振動数、音の大きさは振幅で決まる。音は真空中を伝わらない。</p><div class="formula">速さ＝道のり÷時間</div><h3>力</h3><p>ばねの伸びは加えた力に比例する。力の三要素は<span class="red">作用点・向き・大きさ</span>。</p><div class="trend"><b>入試傾向：</b>作図、オシロスコープ波形、ばねの比例グラフが頻出。</div>`},
{id:'matter',grade:1,field:'化学',icon:'🧪',title:'物質の性質',desc:'密度、気体、水溶液、状態変化',html:`<h2>物質の性質</h2><h3>密度</h3><div class="formula">密度[g/cm³]＝質量[g]÷体積[cm³]</div><p>同じ物質なら量が変わっても密度は同じ。水より密度が小さい物質は水に浮く。</p><h3>気体の集め方</h3><ul><li>水に溶けにくい：水上置換</li><li>空気より軽い：上方置換</li><li>空気より重い：下方置換</li></ul><h3>状態変化</h3><p>状態変化では体積は変わるが、<span class="marker">質量は変わらない</span>。沸騰中の純物質は温度が一定。</p><div class="trend"><b>入試傾向：</b>実験器具の操作理由、温度変化グラフ、密度計算の複合問題。</div>`},
{id:'plants',grade:1,field:'生物',icon:'🌿',title:'植物と生物分類',desc:'花、光合成、呼吸、分類',html:`<h2>植物と生物分類</h2><h3>花のつくり</h3><p>おしべのやくで花粉が作られ、めしべの柱頭につくことを受粉という。受粉後、胚珠は種子、子房は果実になる。</p><h3>光合成と呼吸</h3><div class="formula">二酸化炭素＋水 → デンプンなど＋酸素</div><p>光合成は葉緑体、呼吸は生きた細胞で昼夜行われる。</p><h3>分類</h3><p>種子植物は被子植物と裸子植物。被子植物は単子葉類と双子葉類に分かれる。</p><div class="trend"><b>入試傾向：</b>対照実験、ヨウ素液、BTB溶液の結果から光合成を説明させる問題。</div>`},
{id:'earth1',grade:1,field:'地学',icon:'🪨',title:'大地の変化',desc:'火山、地震、地層、化石',html:`<h2>大地の変化</h2><h3>火山と岩石</h3><p>マグマが地下でゆっくり冷えると深成岩、地表付近で急に冷えると火山岩。深成岩は等粒状組織、火山岩は斑状組織。</p><h3>地震</h3><p>P波は速く初期微動、S波は遅く主要動を起こす。</p><div class="formula">初期微動継続時間が長いほど震源から遠い</div><h3>地層</h3><p>示準化石は年代、示相化石は当時の環境を知る手がかり。</p><div class="trend"><b>入試傾向：</b>P波・S波グラフ、柱状図の対比、火成岩写真の判別。</div>`},
{id:'current',grade:2,field:'物理',icon:'⚡',title:'電流と磁界',desc:'回路、電力、磁界、電磁誘導',html:`<h2>電流と磁界</h2><h3>オームの法則</h3><div class="formula">電圧[V]＝電流[A]×抵抗[Ω]</div><p>直列回路では電流が同じ、並列回路では各枝の電圧が同じ。</p><h3>電力と熱量</h3><div class="formula">電力[W]＝電圧[V]×電流[A]<br>電力量[J]＝電力[W]×時間[s]</div><h3>磁界</h3><p>コイルに電流を流すと電磁石になる。磁界を変化させると誘導電流が流れる。</p><div class="trend"><b>入試傾向：</b>回路図と表を組み合わせた計算、発熱量、電磁誘導の向き。</div>`},
{id:'chemchange',grade:2,field:'化学',icon:'🔥',title:'化学変化と原子',desc:'原子・分子、化学反応式、質量',html:`<h2>化学変化と原子</h2><h3>原子と分子</h3><p>化学変化では原子の組み合わせが変わるが、原子そのものが消えたり新しく生じたりしない。</p><h3>化学反応式</h3><div class="formula">2H₂ ＋ O₂ → 2H₂O</div><p>左右で原子の種類と数をそろえる。化学式の右下の小さい数字は変えない。</p><h3>質量保存</h3><p>密閉された容器では反応前後の全質量は同じ。金属と酸素が反応する質量比は一定。</p><div class="trend"><b>入試傾向：</b>未反応物質を含む質量グラフ、化学反応式、実験操作の理由。</div>`},
{id:'body',grade:2,field:'生物',icon:'🫀',title:'生物の体のつくり',desc:'細胞、消化、呼吸、血液、刺激',html:`<h2>生物の体のつくり</h2><h3>消化と吸収</h3><p>デンプン→ブドウ糖、タンパク質→アミノ酸、脂肪→脂肪酸とモノグリセリド。主に小腸で吸収される。</p><h3>血液循環</h3><p>動脈は心臓から出る血管、静脈は心臓へ戻る血管。肺動脈には静脈血、肺静脈には動脈血が流れる。</p><h3>刺激と反応</h3><p>感覚器官→感覚神経→中枢神経→運動神経→筋肉。反射は大脳を経ず素早く起こる。</p><div class="trend"><b>入試傾向：</b>消化実験、血液成分の表、反射経路を資料から読み取る問題。</div>`},
{id:'weather',grade:2,field:'地学',icon:'🌦️',title:'天気と大気',desc:'気圧、湿度、雲、前線、日本の天気',html:`<h2>天気と大気</h2><h3>湿度</h3><div class="formula">湿度[%]＝実際の水蒸気量÷飽和水蒸気量×100</div><p>空気が冷えて露点に達すると水滴ができる。上昇気流では雲ができやすい。</p><h3>前線</h3><p>温暖前線は広い範囲で弱い雨、寒冷前線は狭い範囲で強い雨になりやすい。</p><h3>日本の天気</h3><p>季節ごとの気団と気圧配置を関連づける。</p><div class="trend"><b>入試傾向：</b>天気図・観測表・湿度計算を横断する総合問題。</div>`},
{id:'motion',grade:3,field:'物理',icon:'🏃',title:'運動とエネルギー',desc:'速さ、力、仕事、エネルギー',html:`<h2>運動とエネルギー</h2><h3>速さ</h3><div class="formula">平均の速さ＝移動距離÷移動時間</div><p>距離－時間グラフの傾きが速さ。速さ－時間グラフの面積が移動距離。</p><h3>仕事</h3><div class="formula">仕事[J]＝力[N]×力の向きに動いた距離[m]</div><h3>力学的エネルギー</h3><p>摩擦などを無視すれば、位置エネルギーと運動エネルギーの和は一定。</p><div class="trend"><b>入試傾向：</b>台車の記録テープ、グラフの傾き・面積、斜面実験の考察。</div>`},
{id:'ion',grade:3,field:'化学',icon:'🔋',title:'イオンと電池',desc:'電解質、電気分解、電池、酸・アルカリ',html:`<h2>イオンと電池</h2><h3>イオン</h3><p>原子が電子を失うと陽イオン、受け取ると陰イオン。電解質の水溶液にはイオンがあり電流が流れる。</p><h3>電池</h3><p>化学変化によって電子が移動し、電気エネルギーを取り出す。電子は導線中を負極から正極へ流れる。</p><h3>中和</h3><div class="formula">酸の水素イオン＋アルカリの水酸化物イオン→水</div><div class="trend"><b>入試傾向：</b>粒子モデル、電極の質量変化、pHや中和のグラフ。</div>`},
{id:'genetics',grade:3,field:'生物',icon:'🧬',title:'生命の連続性',desc:'生殖、遺伝、DNA、進化',html:`<h2>生命の連続性</h2><h3>細胞分裂</h3><p>体細胞分裂では染色体が複製され、同じ遺伝情報をもつ2つの細胞になる。</p><h3>生殖</h3><p>有性生殖では減数分裂で生殖細胞ができ、受精によって染色体数が元に戻る。</p><h3>遺伝</h3><p>形質を表すもとになる情報が遺伝子で、DNAに含まれる。優性・劣性ではなく、現在は顕性・潜性という。</p><div class="trend"><b>入試傾向：</b>遺伝の組合せ、染色体数、実験結果から規則性を説明する問題。</div>`},
{id:'space',grade:3,field:'地学',icon:'🌌',title:'地球と宇宙',desc:'天体の日周運動、季節、月、太陽系',html:`<h2>地球と宇宙</h2><h3>日周運動</h3><p>地球が西から東へ自転するため、天体は東から西へ動いて見える。</p><h3>季節</h3><p>地軸が公転面に対して傾いたまま公転するため、太陽の南中高度と昼の長さが変化する。</p><h3>月</h3><p>月の満ち欠けは太陽・地球・月の位置関係で決まる。月は同じ時刻に見ると毎日東へ移動する。</p><div class="trend"><b>入試傾向：</b>透明半球、方位と時刻、月の位置を空間的に考える作図問題。</div>`}
];
const qs=[
{u:'light',t:'基礎',q:'鏡の面に対して30°の角度で光が入射した。入射角は何度か。',c:['30°','60°','90°','120°'],a:1,e:'入射角は鏡の面ではなく法線との角度。90－30＝60°。'},
{u:'matter',t:'計算',q:'質量54g、体積20cm³の物質の密度は？',c:['0.37g/cm³','2.7g/cm³','34g/cm³','74g/cm³'],a:1,e:'密度＝54÷20＝2.7g/cm³。'},
{u:'plants',t:'実験',q:'光合成で葉にできたデンプンを調べる薬品は？',c:['BTB溶液','石灰水','ヨウ素液','ベネジクト液'],a:2,e:'ヨウ素液はデンプンがあると青紫色になる。'},
{u:'earth1',t:'資料読解',q:'初期微動継続時間が長い地点ほど、一般にどうなる？',c:['震源に近い','震源から遠い','震度が必ず小さい','P波が遅くなる'],a:1,e:'P波とS波の到着時刻の差は震源から遠いほど大きい。'},
{u:'current',t:'計算',q:'6Vの電圧を3Ωの抵抗に加えたときの電流は？',c:['0.5A','2A','3A','18A'],a:1,e:'I＝V÷R＝6÷3＝2A。'},
{u:'chemchange',t:'思考',q:'密閉容器内で炭酸水素ナトリウムを加熱した。反応後の容器全体の質量は？',c:['増える','減る','変わらない','温度次第'],a:2,e:'気体も容器内に残るため、全体の質量は保存される。'},
{u:'body',t:'基礎',q:'心臓から肺へ向かう血管は？',c:['大動脈','肺動脈','肺静脈','大静脈'],a:1,e:'心臓から出る血管は動脈。肺へ向かうので肺動脈。'},
{u:'weather',t:'計算',q:'飽和水蒸気量20g/m³、実際の水蒸気量10g/m³の湿度は？',c:['20%','50%','100%','200%'],a:1,e:'10÷20×100＝50%。'},
{u:'motion',t:'入試',q:'一定の力で物体を力の向きに3m動かし、仕事が18Jだった。力は？',c:['6N','15N','21N','54N'],a:0,e:'力＝仕事÷距離＝18÷3＝6N。'},
{u:'ion',t:'基礎',q:'原子が電子を1個失うとどうなる？',c:['1価の陽イオン','1価の陰イオン','中性子','分子'],a:0,e:'負の電気をもつ電子を失うので正に帯電する。'},
{u:'genetics',t:'思考',q:'体細胞分裂でできる2つの細胞の遺伝情報は、通常どうなる？',c:['互いに異なる','親細胞とほぼ同じ','半分になる','なくなる'],a:1,e:'複製した染色体が均等に分配される。'},

let currentUnit=null,queue=[],qi=0,answered=false,stats=JSON.parse(localStorage.getItem('scienceStats')||'{"learned":[],"ok":0,"all":0,"streak":0,"weak":[]}');
function save(){localStorage.setItem('scienceStats',JSON.stringify(stats));renderStats()}function renderStats(){learned.textContent=stats.learned.length;correctRate.textContent=stats.all?Math.round(stats.ok/stats.all*100)+'%':'0%';streak.textContent=stats.streak}function show(id,tab){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');if(tab){document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));tab.classList.add('active')}scrollTo(0,0)}function renderFilters(){let arr=['すべて','中1','中2','中3','物理','化学','生物','地学'];filters.innerHTML=arr.map((x,i)=>`<button class="chip ${i?'':'active'}" onclick="filterUnits('${x}',this)">${x}</button>`).join('')}function filterUnits(f,b){document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderUnits(f)}function renderUnits(f='すべて'){let a=units.filter(u=>f==='すべて'||f===`中${u.grade}`||f===u.field);unitsEl=a.map(u=>`<button class="unit" onclick="openLesson('${u.id}')"><span class="icon">${u.icon}</span><h3>中${u.grade}｜${u.title}</h3><p>${u.desc}</p><div class="bar"><i style="width:${stats.learned.includes(u.id)?100:0}%"></i></div></button>`).join('');document.getElementById('units').innerHTML=unitsEl}function openLesson(id){currentUnit=units.find(u=>u.id===id);board.innerHTML=currentUnit.html;show('lesson')}function markLearned(){if(!stats.learned.includes(currentUnit.id))stats.learned.push(currentUnit.id);save();renderUnits();alert('学習済みにしました')}function startRandomLesson(){openLesson(units[Math.floor(Math.random()*units.length)].id)}function startUnitQuiz(){queue=qs.filter(q=>q.u===currentUnit.id);if(!queue.length)queue=qs.filter(q=>q.u===currentUnit.id||q.t==='入試').slice(0,5);startQuiz()}function startExam(tab){queue=[...qs].filter(q=>q.t==='入試'||q.t==='資料読解'||q.t==='思考').sort(()=>Math.random()-.5).slice(0,10);startQuiz();if(tab){document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));tab.classList.add('active')}}function startWeak(tab){queue=qs.filter(q=>stats.weak.includes(q.q));if(!queue.length)queue=[...qs].sort(()=>Math.random()-.5).slice(0,5);startQuiz();if(tab){document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));tab.classList.add('active')}}function startQuiz(){qi=0;show('quiz');renderQ()}function renderQ(){answered=false;let q=queue[qi];qType.textContent=q.t;qCount.textContent=`${qi+1}/${queue.length}`;question.textContent=q.q;choices.innerHTML=q.c.map((x,i)=>`<button class="choice" onclick="answer(${i},this)">${x}</button>`).join('');explain.style.display='none';next.style.display='none'}function answer(i,b){if(answered)return;answered=true;let q=queue[qi];stats.all++;document.querySelectorAll('.choice').forEach((x,n)=>{x.disabled=true;if(n===q.a)x.classList.add('correct')});if(i===q.a){stats.ok++;stats.streak++;stats.weak=stats.weak.filter(x=>x!==q.q)}else{b.classList.add('wrong');stats.streak=0;if(!stats.weak.includes(q.q))stats.weak.push(q.q)}explain.textContent=(i===q.a?'正解！ ':'不正解。 ')+q.e;explain.style.display='block';next.textContent=qi===queue.length-1?'結果を見る':'次の問題';next.style.display='block';save()}function nextQuestion(){qi++;if(qi>=queue.length){alert(`演習終了！ 正答率 ${stats.all?Math.round(stats.ok/stats.all*100):0}%`);show('home');renderUnits()}else renderQ()}renderFilters();renderUnits();renderStats();</script></body></html>
