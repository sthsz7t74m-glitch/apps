<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050816">
<title>NEON ALARM</title>
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#eefcff;background:#050816;--cyan:#42f5ff;--pink:#ff4fd8;--panel:rgba(9,16,38,.9);--line:rgba(66,245,255,.22)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100dvh;background:radial-gradient(circle at 12% 8%,rgba(139,92,255,.22),transparent 26rem),radial-gradient(circle at 88% 22%,rgba(66,245,255,.14),transparent 24rem),linear-gradient(180deg,#050816,#090d1d 55%,#050816);overflow-x:hidden}button,input,select{font:inherit}button{touch-action:manipulation}main{width:min(100%,760px);margin:auto;padding:max(14px,env(safe-area-inset-top)) 14px max(26px,env(safe-area-inset-bottom))}.top{display:flex;align-items:center;justify-content:space-between}.back{color:#b9c6da;text-decoration:none;font-weight:800}.version{font-size:11px;color:#73819d}.brand{text-align:center}.brand h1{margin:0;color:var(--cyan);font-size:22px;letter-spacing:.15em;text-shadow:0 0 9px var(--cyan)}.brand small{color:#8794ad}.clock{text-align:center;padding:24px 0 16px}.clock-time{font-size:clamp(54px,17vw,96px);font-weight:200;letter-spacing:-.06em;line-height:1;text-shadow:0 0 18px rgba(66,245,255,.32)}.clock-date{margin-top:8px;color:#8fa0bc}.card{border:1px solid var(--line);border-radius:22px;background:var(--panel);box-shadow:0 0 24px rgba(66,245,255,.06);backdrop-filter:blur(14px)}.next{padding:18px;margin-bottom:14px;text-align:center}.eyebrow{margin:0 0 5px;color:var(--pink);font-size:11px;font-weight:900;letter-spacing:.15em}.next-time{margin:0;font-size:38px;color:var(--cyan);text-shadow:0 0 11px rgba(66,245,255,.55)}.next-meta{margin:5px 0 0;color:#9caac0}.notice{margin:0 0 14px;padding:11px 13px;border:1px solid rgba(255,79,216,.25);border-radius:14px;color:#aebbd0;background:rgba(255,79,216,.05);font-size:12px;line-height:1.55}.section-head{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 10px}.section-head h2{margin:0;font-size:17px}.sort{padding:8px 10px;border:1px solid #283552;border-radius:11px;background:#0b1228;color:#cfdaeb}.list{display:grid;gap:10px}.alarm{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;padding:14px;border:1px solid rgba(139,92,255,.2);border-left:4px solid var(--accent,var(--cyan));border-radius:18px;background:rgba(10,17,39,.92)}.alarm-time{font-size:28px;font-weight:300}.alarm-title{margin-top:3px;color:#dbe7f7;font-weight:800}.alarm-sub{margin-top:4px;color:#7f8da7;font-size:12px;line-height:1.35}.switch{position:relative;width:48px;height:28px;border:0;border-radius:999px;background:#27314a}.switch:after{position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;background:#8390a7;content:"";transition:.18s}.switch.on{background:rgba(66,245,255,.22);box-shadow:0 0 12px rgba(66,245,255,.35)}.switch.on:after{left:24px;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}.alarm-actions{display:flex;gap:7px;margin-top:9px}.mini{padding:7px 10px;border:1px solid #293754;border-radius:9px;background:#0b1228;color:#d5e0ef;font-size:12px}.fab{position:sticky;z-index:3;bottom:max(14px,env(safe-area-inset-bottom));display:block;width:100%;margin-top:16px;padding:15px;border:1px solid rgba(255,79,216,.42);border-radius:16px;background:linear-gradient(135deg,#7c3aed,#db2777);color:white;font-weight:900;box-shadow:0 0 20px rgba(255,79,216,.3)}.modal{display:none;position:fixed;inset:0;z-index:50;align-items:flex-end;justify-content:center;padding:12px;background:rgba(1,3,12,.8);backdrop-filter:blur(5px)}.modal.on{display:flex}.sheet{--preview:#42f5ff;width:min(100%,620px);max-height:92dvh;overflow:auto;border:1px solid var(--preview);border-radius:24px;background:#081022;box-shadow:0 0 38px color-mix(in srgb,var(--preview) 45%,transparent)}form{padding:18px}.form-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}.form-head h2{margin:0}.close{border:0;background:none;color:#9aa8bf;font-size:28px}.time-input{width:100%;padding:12px;border:1px solid var(--preview);border-radius:15px;background:#050a18;color:var(--preview);font-size:42px;text-align:center;box-shadow:0 0 14px color-mix(in srgb,var(--preview) 25%,transparent)}.field{display:grid;gap:6px;margin-top:13px}.field label,.label{color:#aab6ca;font-size:12px;font-weight:800}.field input,.field select{width:100%;padding:11px;border:1px solid #263653;border-radius:12px;background:#071024;color:#edf8ff}.days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.day{padding:9px 0;border:1px solid #293755;border-radius:10px;background:#071024;color:#8b99b1;font-size:12px;font-weight:900}.day.on{border-color:var(--preview);color:#06101c;background:var(--preview);box-shadow:0 0 10px color-mix(in srgb,var(--preview) 45%,transparent)}details{margin-top:13px;border:1px solid #263653;border-radius:14px;background:#070d1e}summary{padding:13px;color:#d4e2f3;font-weight:900}.details-body{display:grid;gap:12px;padding:0 13px 13px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.check{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px;border:1px solid #23304a;border-radius:12px;color:#c7d3e3}.check input{accent-color:var(--preview)}.save{width:100%;margin-top:15px;padding:14px;border:0;border-radius:14px;background:linear-gradient(135deg,var(--preview),#7c3aed);color:#06101c;font-weight:950}.color-preview{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid #263653;border-radius:12px;background:#071024}.swatch{width:34px;height:34px;border-radius:10px;background:var(--preview);box-shadow:0 0 14px var(--preview)}.monthly{display:none}.monthly.on{display:grid}.ring{display:none;position:fixed;inset:0;z-index:80;place-items:center;padding:20px;background:radial-gradient(circle,rgba(139,92,255,.35),#03050d 65%)}.ring.on{display:grid}.ring-box{text-align:center}.ring-time{font-size:72px;color:var(--cyan);text-shadow:0 0 25px var(--cyan)}.ring-title{font-size:24px}.slider{position:relative;width:min(88vw,420px);height:66px;margin-top:30px;border:1px solid rgba(66,245,255,.3);border-radius:999px;background:#071024;overflow:hidden}.slider-label{position:absolute;inset:0;display:grid;place-items:center;color:#8392aa;font-weight:900}.knob{position:absolute;z-index:2;top:7px;left:7px;display:grid;width:52px;height:52px;border-radius:50%;place-items:center;background:var(--cyan);color:#071024;font-size:24px;box-shadow:0 0 18px var(--cyan);touch-action:none}.empty{padding:28px;text-align:center;color:#7888a3}@media(min-width:640px){.modal{align-items:center}.sheet{max-height:88dvh}}
</style>
</head>
<body>
<main>
<header class="top"><a class="back" href="../">← APPS</a><div class="brand"><h1>NEON ALARM</h1><small>Flexible Wake System</small></div><span class="version">v0.2.0</span></header>
<section class="clock"><div id="clock" class="clock-time">00:00</div><div id="date" class="clock-date"></div></section>
<section class="card next"><p class="eyebrow">NEXT ALARM</p><h2 id="nextTime" class="next-time">--:--</h2><p id="nextMeta" class="next-meta">有効なアラームはありません</p></section>
<p class="notice">音は停止操作まで繰り返します。ただしiPhoneのWebアプリでは、マナーモード中・画面消灯中・ページを閉じた状態の再生をOSが制限する場合があります。</p>
<div class="section-head"><h2>アラーム</h2><select id="sort" class="sort"><option value="time">時間順</option><option value="on">ON優先</option><option value="manual">登録順</option></select></div>
<section id="list" class="list"></section>
<button type="button" id="add" class="fab">＋ アラームを追加</button>
</main>
<div id="editor" class="modal" aria-hidden="true"><div id="sheet" class="sheet"><form id="form"><div class="form-head"><h2 id="formTitle">アラーム追加</h2><button type="button" class="close" id="close">×</button></div><input id="editTime" class="time-input" type="time" value="07:00" required><div class="field"><label>タイトル</label><input id="editTitle" value="目覚まし" maxlength="30"></div><div class="field"><label>繰り返し方法</label><select id="repeatType"><option value="weekly">毎週・曜日指定</option><option value="biweekly">隔週・曜日指定</option><option value="monthly">毎月・日付指定</option></select></div><div id="weeklyArea" class="field"><span class="label">繰り返す曜日</span><div id="days" class="days"></div></div><div id="monthlyArea" class="field monthly"><label>毎月の日付</label><input id="monthDay" type="number" min="1" max="31" value="1"></div><details><summary>詳細設定</summary><div class="details-body"><div class="row"><div class="field"><label>スヌーズ</label><select id="snooze"><option>5</option><option selected>10</option><option>15</option><option>20</option><option>30</option></select></div><div class="field"><label>スヌーズ回数</label><select id="snoozeCount"><option>1</option><option>2</option><option selected>3</option><option>5</option><option value="99">無制限</option></select></div></div><div class="field"><label>フェードイン</label><select id="fade"><option value="0">なし</option><option value="30">30秒</option><option value="60" selected>1分</option><option value="180">3分</option></select></div><label class="check"><span>祝日は鳴らさない</span><input id="ignoreHoliday" type="checkbox"></label><label class="check"><span>土日は鳴らさない</span><input id="ignoreWeekend" type="checkbox"></label><label class="check"><span>バイブレーション</span><input id="vibrate" type="checkbox" checked></label><label class="check"><span>30分前に事前通知</span><input id="preNotice" type="checkbox"></label><div class="field"><label>ラベルカラー</label><div class="color-preview"><span class="swatch"></span><input id="color" type="color" value="#42f5ff"></div></div><button type="button" id="test" class="mini">この設定でテスト</button></div></details><button type="submit" class="save">保存</button></form></div></div>
<div id="ring" class="ring"><div class="ring-box"><div id="ringTime" class="ring-time">07:00</div><div id="ringTitle" class="ring-title">目覚まし</div><div id="slider" class="slider"><div class="slider-label">右へスライドして停止</div><div id="knob" class="knob">›</div></div></div></div>
<script>
(()=>{'use strict';const $=s=>document.querySelector(s),daysJ=['日','月','火','水','木','金','土'];let alarms;try{alarms=JSON.parse(localStorage.getItem('neonAlarms')||'null')}catch(e){alarms=null}alarms=(alarms||[]).map(a=>({...a,repeatType:a.repeatType||(Number(a.interval)===2?'biweekly':'weekly'),monthDay:a.monthDay||1}));if(!alarms.length)alarms=[{id:Date.now(),time:'06:30',title:'仕事',days:[1,2,3,4,5],repeatType:'weekly',monthDay:1,snooze:10,snoozeCount:3,fade:60,ignoreHoliday:true,ignoreWeekend:true,vibrate:true,preNotice:false,color:'#42f5ff',on:true}];let editing=null,ringing=null,audioCtx=null,oscillators=[],selectedDays=[];const save=()=>localStorage.setItem('neonAlarms',JSON.stringify(alarms));const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function isActiveToday(a,d){if(a.ignoreWeekend&&(d.getDay()===0||d.getDay()===6))return false;if(a.repeatType==='monthly')return d.getDate()===Number(a.monthDay);if(!a.days.includes(d.getDay()))return false;if(a.repeatType==='biweekly'){const start=new Date(d.getFullYear(),0,1),week=Math.floor((d-start)/604800000);if(week%2!==0)return false}return true}
function nextOccurrence(a){const now=new Date();for(let k=0;k<62;k++){const d=new Date(now);d.setDate(now.getDate()+k);if(!isActiveToday(a,d))continue;const[h,m]=a.time.split(':').map(Number);d.setHours(h,m,0,0);if(d>now)return d}return null}
function renderNext(){const next=alarms.filter(a=>a.on).map(a=>({a,d:nextOccurrence(a)})).filter(x=>x.d).sort((x,y)=>x.d-y.d)[0];if(!next){$('#nextTime').textContent='--:--';$('#nextMeta').textContent='有効なアラームはありません';return}const ms=next.d-new Date(),h=Math.floor(ms/3600000),m=Math.floor(ms%3600000/60000);$('#nextTime').textContent=next.a.time;$('#nextMeta').textContent=`${next.a.title} ・ あと ${h}時間${m}分`}
function repeatLabel(a){if(a.repeatType==='monthly')return `毎月${a.monthDay}日`;const d=a.days.map(x=>daysJ[x]).join('・')||'曜日未設定';return `${d}${a.repeatType==='biweekly'?' ・ 隔週':''}`}
function render(){let list=[...alarms],sort=$('#sort').value;if(sort==='time')list.sort((a,b)=>a.time.localeCompare(b.time));if(sort==='on')list.sort((a,b)=>Number(b.on)-Number(a.on)||a.time.localeCompare(b.time));$('#list').innerHTML=list.length?'':'<div class="card empty">アラームはまだありません</div>';list.forEach(a=>{const el=document.createElement('article');el.className='alarm';el.style.setProperty('--accent',a.color||'#42f5ff');el.dataset.id=a.id;el.innerHTML=`<div class="alarm-time">${esc(a.time)}</div><div><div class="alarm-title">${esc(a.title)}</div><div class="alarm-sub">${repeatLabel(a)}${a.ignoreHoliday?' ・ 祝日除外':''}${a.ignoreWeekend?' ・ 土日除外':''}</div><div class="alarm-actions"><button class="mini edit">編集</button><button class="mini del">削除</button></div></div><button class="switch ${a.on?'on':''}" aria-label="ON/OFF"></button>`;$('#list').appendChild(el)})}
function openEditor(a){editing=a?a.id:null;const data=a||{time:'07:00',title:'目覚まし',days:[1,2,3,4,5],repeatType:'weekly',monthDay:1,snooze:10,snoozeCount:3,fade:60,ignoreHoliday:false,ignoreWeekend:false,vibrate:true,preNotice:false,color:'#42f5ff'};$('#formTitle').textContent=a?'アラーム編集':'アラーム追加';$('#editTime').value=data.time;$('#editTitle').value=data.title;$('#repeatType').value=data.repeatType;$('#monthDay').value=data.monthDay||1;$('#snooze').value=data.snooze;$('#snoozeCount').value=data.snoozeCount;$('#fade').value=data.fade;$('#ignoreHoliday').checked=!!data.ignoreHoliday;$('#ignoreWeekend').checked=!!data.ignoreWeekend;$('#vibrate').checked=!!data.vibrate;$('#preNotice').checked=!!data.preNotice;$('#color').value=data.color||'#42f5ff';selectedDays=[...(data.days||[])];renderDays();syncRepeatUI();previewColor();$('#editor').classList.add('on');$('#editor').setAttribute('aria-hidden','false')}
function closeEditor(){$('#editor').classList.remove('on');$('#editor').setAttribute('aria-hidden','true')}
function renderDays(){$('#days').innerHTML='';daysJ.forEach((d,i)=>{const b=document.createElement('button');b.type='button';b.className='day'+(selectedDays.includes(i)?' on':'');b.textContent=d;b.onclick=()=>{selectedDays=selectedDays.includes(i)?selectedDays.filter(x=>x!==i):[...selectedDays,i];renderDays()};$('#days').appendChild(b)})}
function syncRepeatUI(){const monthly=$('#repeatType').value==='monthly';$('#weeklyArea').style.display=monthly?'none':'grid';$('#monthlyArea').classList.toggle('on',monthly)}
function previewColor(){$('#sheet').style.setProperty('--preview',$('#color').value)}
function tick(){const n=new Date();$('#clock').textContent=n.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});$('#date').textContent=n.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});renderNext();const hh=String(n.getHours()).padStart(2,'0'),mm=String(n.getMinutes()).padStart(2,'0');alarms.forEach(a=>{if(a.on&&a.time===`${hh}:${mm}`&&isActiveToday(a,n)&&a.last!==n.toDateString()){a.last=n.toDateString();save();startRing(a)}})}
function startSound(){stopSound();audioCtx=new(window.AudioContext||window.webkitAudioContext)();const master=audioCtx.createGain();master.gain.value=.12;master.connect(audioCtx.destination);const playTone=()=>{if(!audioCtx)return;const now=audioCtx.currentTime;[660,880].forEach((f,j)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,now+j*.32);g.gain.linearRampToValueAtTime(.8,now+j*.32+.04);g.gain.exponentialRampToValueAtTime(.001,now+j*.32+.27);o.connect(g);g.connect(master);o.start(now+j*.32);o.stop(now+j*.32+.3);oscillators.push(o)});setTimeout(playTone,900)};playTone()}
function stopSound(){oscillators.forEach(o=>{try{o.stop()}catch(e){}});oscillators=[];if(audioCtx){audioCtx.close();audioCtx=null}}
function startRing(a){ringing=a;$('#ringTime').textContent=a.time;$('#ringTitle').textContent=a.title;$('#ring').classList.add('on');if(a.vibrate&&navigator.vibrate)navigator.vibrate([500,250,500,250,900]);startSound()}
function stopRing(){stopSound();navigator.vibrate?.(0);$('#ring').classList.remove('on');ringing=null;$('#knob').style.left='7px'}
$('#add').onclick=()=>openEditor(null);$('#close').onclick=closeEditor;$('#editor').onclick=e=>{if(e.target.id==='editor')closeEditor()};$('#repeatType').onchange=syncRepeatUI;$('#color').oninput=previewColor;$('#sort').onchange=render;$('#list').onclick=e=>{const card=e.target.closest('.alarm');if(!card)return;const a=alarms.find(x=>String(x.id)===card.dataset.id);if(!a)return;if(e.target.closest('.edit'))openEditor(a);else if(e.target.closest('.del')){if(confirm('このアラームを削除しますか？')){alarms=alarms.filter(x=>x.id!==a.id);save();render()}}else if(e.target.closest('.switch')){a.on=!a.on;save();render()}};
$('#form').onsubmit=e=>{e.preventDefault();const repeatType=$('#repeatType').value;if(repeatType!=='monthly'&&!selectedDays.length){alert('曜日を1つ以上選んでください');return}const data={time:$('#editTime').value,title:$('#editTitle').value||'目覚まし',days:[...selectedDays],repeatType,monthDay:Math.min(31,Math.max(1,Number($('#monthDay').value)||1)),snooze:Number($('#snooze').value),snoozeCount:Number($('#snoozeCount').value),fade:Number($('#fade').value),ignoreHoliday:$('#ignoreHoliday').checked,ignoreWeekend:$('#ignoreWeekend').checked,vibrate:$('#vibrate').checked,preNotice:$('#preNotice').checked,color:$('#color').value,on:true};if(editing){Object.assign(alarms.find(a=>a.id===editing),data)}else alarms.push({id:Date.now(),...data});save();render();closeEditor()};$('#test').onclick=()=>startRing({time:$('#editTime').value,title:$('#editTitle').value||'テスト',vibrate:$('#vibrate').checked});
let dragging=false,startX=0;$('#knob').addEventListener('pointerdown',e=>{dragging=true;startX=e.clientX;$('#knob').setPointerCapture(e.pointerId)});$('#knob').addEventListener('pointermove',e=>{if(!dragging)return;const max=$('#slider').clientWidth-59,x=Math.max(7,Math.min(max,7+e.clientX-startX));$('#knob').style.left=x+'px';if(x>=max-4){dragging=false;stopRing()}});$('#knob').addEventListener('pointerup',()=>{if(dragging){dragging=false;$('#knob').style.left='7px'}});setInterval(tick,1000);tick();render();
})();
</script>
</body></html>
