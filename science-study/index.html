<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#e7dfca"><title>理科ホワイトボード</title><style>:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--green:#274a3e;--paper:#fbfaf3;--wood:#ac9875;--red:#c84942;--blue:#2e6ca4;--yellow:#f5d565}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:linear-gradient(135deg,#d7ceb7,#f0eadc);color:#24352f;min-height:100dvh}button,select{font:inherit}.app{width:min(100%,860px);margin:auto;padding:max(14px,env(safe-area-inset-top)) 13px calc(90px + env(safe-area-inset-bottom))}.screen{display:none}.screen.active{display:block}.top{display:flex;justify-content:space-between;align-items:start}.top h1{margin:0;font-size:28px}.top p{margin:4px 0 0;color:#65746e;font-size:12px}.ver{background:var(--green);color:white;border-radius:999px;padding:5px 9px;font-size:10px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.stat{background:#f8f4e9;border:1px solid #c7bda9;border-radius:15px;padding:10px;text-align:center}.stat b{display:block;font-size:19px;color:var(--green)}.stat span{font-size:10px;color:#68766f}.hero{background:var(--green);color:white;border-radius:20px;padding:17px;box-shadow:0 10px 25px #44584f33}.hero h2{margin:0 0 5px}.hero p{margin:0;color:#d8e5df;font-size:13px;line-height:1.55}.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.btn{border:0;border-radius:13px;padding:12px;font-weight:800}.primary{background:var(--yellow);color:#26332e}.secondary{background:#42685b;color:white;border:1px solid #6f8d83}.head{display:flex;justify-content:space-between;align-items:end;margin:18px 2px 9px}.head h2{font-size:17px;margin:0}.head span{font-size:10px;color:#69756f}.filters{display:flex;gap:6px;overflow:auto;padding-bottom:9px}.chip{border:1px solid #bdb4a2;background:#f8f4e9;color:#596861;border-radius:999px;padding:7px 11px;white-space:nowrap;font-size:11px;font-weight:800}.chip.active{background:var(--green);color:white}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.unit{background:#faf7ee;border:1px solid #c9bfab;border-radius:17px;padding:13px;text-align:left;color:inherit;min-height:137px;box-shadow:0 4px 13px #655e5022}.unit .icon{font-size:24px}.unit h3{margin:7px 0 4px;font-size:14px}.unit p{margin:0;color:#6a7771;font-size:11px;line-height:1.45}.unit small{display:block;margin-top:8px;color:#356454;font-weight:800}.bar{height:5px;background:#ded7c7;border-radius:8px;margin-top:8px;overflow:hidden}.bar i{display:block;height:100%;background:#4d8b70}.back{border:0;background:transparent;color:#376152;font-weight:900;padding:5px 0 11px}.boardWrap{position:relative}.board{background:var(--paper);border:10px solid var(--wood);border-radius:14px;box-shadow:inset 0 0 20px #a39b8222,0 9px 23px #514a3e33;padding:18px 17px;min-height:430px}.board h2{margin:0;color:var(--green);font-size:22px;border-bottom:3px solid var(--green);padding-bottom:6px}.board h3{color:var(--blue);margin:17px 0 6px;font-size:16px}.board p,.board li{font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;line-height:1.72;font-size:14px}.board ul{padding-left:20px}.marker{background:linear-gradient(transparent 58%,#ffe48a 58%);font-weight:800}.red{color:var(--red);font-weight:900}.formula{margin:12px 0;padding:10px;border:2px dashed var(--blue);border-radius:8px;text-align:center;color:var(--blue);font-size:17px;font-weight:900}.diagram{white-space:pre-wrap;font-family:ui-monospace,monospace;background:#efede4;border-radius:10px;padding:11px;color:#344c43;line-height:1.5}.trend{margin-top:15px;border-left:5px solid var(--red);background:#fff0eb;padding:11px;border-radius:0 10px 10px 0;font-size:12px;line-height:1.55}.pager{display:flex;justify-content:space-between;align-items:center;margin-top:18px}.dots{display:flex;gap:5px}.dot{width:8px;height:8px;border-radius:50%;background:#c8c0ae}.dot.active{background:var(--green)}.pager button{border:0;border-radius:11px;padding:9px 13px;font-weight:800}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.quiz{background:#f9f5ea;border:1px solid #c9bfaa;border-radius:20px;padding:16px}.meta{display:flex;justify-content:space-between;color:#6f7c76;font-size:11px}.question{font-size:18px;font-weight:900;line-height:1.55;margin:22px 0}.choices{display:grid;gap:8px}.choice{border:1px solid #bdb4a2;border-radius:13px;padding:12px;background:white;text-align:left;color:#253832}.choice.correct{background:#dff4e8;border-color:#4d9a70}.choice.wrong{background:#ffe1df;border-color:#d85a53}.explain{display:none;margin-top:13px;background:#eee9da;border-radius:12px;padding:12px;line-height:1.65;font-size:13px}.next{display:none;width:100%;margin-top:11px}.result{text-align:center;background:#f9f5ea;border:1px solid #c9bfaa;border-radius:20px;padding:25px}.result b{display:block;font-size:52px;color:var(--green)}.tabs{position:fixed;bottom:0;left:0;right:0;background:#f7f3e8ee;backdrop-filter:blur(12px);border-top:1px solid #bbb2a0;padding:7px 8px calc(7px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:5px}.tabs button{border:0;background:transparent;color:#6e7873;padding:8px 15px;border-radius:12px;font-size:11px;font-weight:900}.tabs button.active{background:var(--green);color:white}@media(max-width:430px){.board{padding:15px 13px}.unit{padding:11px}.tabs button{padding:8px 11px}}</style></head><body><main class="app"><section id="home" class="screen active"><div class="top"><div><h1>理科ホワイトボード</h1><p>中学3年間の授業＋高校入試対策</p></div><span class="ver">v1.2.0</span></div><div class="stats"><div class="stat"><b id="learned">0</b><span>学習済み</span></div><div class="stat"><b id="correctRate">0%</b><span>正答率</span></div><div class="stat"><b id="weakCount">0</b><span>苦手問題</span></div></div><div class="hero"><h2>授業 → 演習 → 復習</h2><p>1単元3枚のホワイトボードで理解し、確認問題と入試形式問題で定着させよう。</p><div class="row2"><button class="btn primary" onclick="startRandomLesson()">今日の授業</button><button class="btn secondary" onclick="startExam()">入試ミックス</button></div></div><div class="head"><h2>単元別教材</h2><span>全12単元・36枚</span></div><div class="filters" id="filters"></div><div class="grid" id="units"></div></section><section id="lesson" class="screen"><button class="back" onclick="show('home')">← 単元一覧</button><div class="boardWrap"><div class="board" id="board"></div></div><div class="pager"><button onclick="prevBoard()">← 前へ</button><div class="dots" id="dots"></div><button onclick="nextBoard()">次へ →</button></div><div class="actions"><button class="btn secondary" onclick="markLearned()">学習済みにする</button><button class="btn primary" onclick="startUnitQuiz()">単元テスト</button></div></section><section id="quiz" class="screen"><button class="back" onclick="show('home')">← ホーム</button><div class="quiz" id="quizBox"><div class="meta"><span id="qType"></span><span id="qCount"></span></div><div class="question" id="question"></div><div class="choices" id="choices"></div><div class="explain" id="explain"></div><button class="btn primary next" id="next" onclick="nextQuestion()">次の問題</button></div><div class="result" id="result" style="display:none"><span>今回の結果</span><b id="scoreText">0%</b><p id="resultMsg"></p><button class="btn primary" onclick="show('home')">単元一覧へ</button></div></section></main><nav class="tabs"><button class="active" onclick="show('home',this)">単元</button><button onclick="startExam(this)">入試演習</button><button onclick="startWeak(this)">苦手復習</button></nav><script>const U=[{id:'light',g:1,f:'物理',i:'🔦',t:'光・音・力',d:'反射・屈折、音、ばね',b:[`<h2>光の反射・屈折</h2><p>反射では<span class="marker">入射角＝反射角</span>。角度は鏡面ではなく法線から測る。</p><div class="diagram">入射光 ↘ ｜法線｜ ↗ 反射光<br>　　　　　──鏡──</div><p>空気→ガラスでは法線側、ガラス→空気では法線から離れる。</p><div class="trend"><b>入試：</b>作図と角度計算が頻出。</div>`,`<h2>音の性質</h2><p>音の高さは<span class="red">振動数</span>、大きさは振幅で決まる。音は真空中を伝わらない。</p><div class="formula">速さ＝道のり÷時間</div><p>波形では横方向の細かさが高さ、縦方向の大きさが音量を表す。</p>`,`<h2>力とばね</h2><p>力の三要素は作用点・向き・大きさ。ばねの伸びは加えた力に比例する。</p><div class="formula">比例：力が2倍なら伸びも2倍</div><div class="trend"><b>入試：</b>比例グラフから未知の値を求める。</div>`]},{id:'matter',g:1,f:'化学',i:'🧪',t:'物質の性質',d:'密度、気体、状態変化',b:[`<h2>密度</h2><div class="formula">密度[g/cm³]＝質量[g]÷体積[cm³]</div><p>同じ物質なら量が変わっても密度は一定。単位をそろえて計算する。</p>`,`<h2>気体の性質</h2><ul><li>水に溶けにくい：水上置換</li><li>空気より軽い：上方置換</li><li>空気より重い：下方置換</li></ul><p>酸素はものを燃えやすくし、二酸化炭素は石灰水を白く濁らせる。</p>`,`<h2>状態変化</h2><p>状態変化では体積が変わっても<span class="marker">質量は変わらない</span>。純物質は融点・沸点が一定。</p><div class="trend"><b>入試：</b>加熱曲線と実験操作の理由。</div>`]},{id:'plants',g:1,f:'生物',i:'🌿',t:'植物と分類',d:'花、光合成、生物分類',b:[`<h2>花のつくり</h2><p>受粉後、胚珠は種子、子房は果実になる。裸子植物には子房がない。</p>`,`<h2>光合成と呼吸</h2><div class="formula">二酸化炭素＋水 → デンプンなど＋酸素</div><p>光合成は葉緑体、呼吸は生きた細胞で昼夜行われる。</p>`,`<h2>分類</h2><p>被子植物は単子葉類と双子葉類。根・葉脈・維管束の違いをセットで覚える。</p><div class="trend"><b>入試：</b>対照実験の目的説明。</div>`]},{id:'earth1',g:1,f:'地学',i:'🪨',t:'大地の変化',d:'火山、地震、地層',b:[`<h2>火山と岩石</h2><p>急冷した火山岩は斑状組織、ゆっくり冷えた深成岩は等粒状組織。</p>`,`<h2>地震</h2><p>P波は速く初期微動、S波は遅く主要動を起こす。</p><div class="formula">初期微動継続時間が長いほど震源から遠い</div>`,`<h2>地層と化石</h2><p>示準化石は年代、示相化石は環境を示す。</p><div class="trend"><b>入試：</b>P・S波グラフ、柱状図対比。</div>`]},{id:'current',g:2,f:'物理',i:'⚡',t:'電流と磁界',d:'回路、電力、電磁誘導',b:[`<h2>オームの法則</h2><div class="formula">V＝IR</div><p>直列回路は電流一定、並列回路は電圧一定。</p>`,`<h2>電力と熱量</h2><div class="formula">電力[W]＝電圧[V]×電流[A]</div><div class="formula">電力量[J]＝電力[W]×時間[s]</div>`,`<h2>磁界</h2><p>コイルの磁界は電流を大きくする、巻数を増やす、鉄心を入れると強くなる。</p><div class="trend"><b>入試：</b>複合回路計算と電磁誘導。</div>`]},{id:'chem',g:2,f:'化学',i:'⚗️',t:'化学変化',d:'原子、分子、質量変化',b:[`<h2>原子と分子</h2><p>化学変化では原子の組み合わせが変わるが、原子の種類と数は保存される。</p>`,`<h2>化学反応式</h2><div class="formula">2H₂＋O₂ → 2H₂O</div><p>係数で左右の原子数をそろえる。</p>`,`<h2>質量保存・定比例</h2><p>密閉容器では反応前後の総質量は等しい。化合する質量比は一定。</p><div class="trend"><b>入試：</b>グラフから過不足を判断。</div>`]},{id:'body',g:2,f:'生物',i:'🫀',t:'動物のからだ',d:'消化、呼吸、循環、排出',b:[`<h2>消化と吸収</h2><p>デンプン→ブドウ糖、タンパク質→アミノ酸、脂肪→脂肪酸とモノグリセリド。</p>`,`<h2>呼吸と循環</h2><p>肺胞は表面積が大きく毛細血管が多い。赤血球のヘモグロビンが酸素を運ぶ。</p>`,`<h2>排出</h2><p>腎臓は血液から尿素などをこし取り尿をつくる。</p><div class="trend"><b>入試：</b>器官を関連づけた資料問題。</div>`]},{id:'weather',g:2,f:'地学',i:'🌦️',t:'天気と気象',d:'湿度、雲、前線、天気図',b:[`<h2>湿度</h2><div class="formula">湿度[%]＝実際の水蒸気量÷飽和水蒸気量×100</div>`,`<h2>雲のでき方</h2><p>空気が上昇→膨張→温度低下→露点→凝結。</p>`,`<h2>前線</h2><p>温暖前線は広い範囲で弱い雨、寒冷前線は狭い範囲で強い雨。</p><div class="trend"><b>入試：</b>天気図と風向・湿度計算。</div>`]},{id:'motion',g:3,f:'物理',i:'🏎️',t:'運動とエネルギー',d:'速さ、力、仕事、エネルギー',b:[`<h2>速さと運動</h2><div class="formula">速さ＝移動距離÷時間</div><p>等速直線運動では速さが一定。</p>`,`<h2>力のつり合い</h2><p>一直線上、反対向き、同じ大きさの2力はつり合う。</p>`,`<h2>仕事とエネルギー</h2><div class="formula">仕事[J]＝力[N]×距離[m]</div><p>力学的エネルギーは位置＋運動。</p><div class="trend"><b>入試：</b>台車グラフと仕事率。</div>`]},{id:'ion',g:3,f:'化学',i:'🔋',t:'イオンと電池',d:'電離、電池、酸・アルカリ',b:[`<h2>イオン</h2><p>原子が電子を失うと陽イオン、受け取ると陰イオン。</p>`,`<h2>電池</h2><p>化学エネルギーを電気エネルギーへ変換。電子は導線を負極から正極へ流れる。</p>`,`<h2>中和</h2><div class="formula">酸＋アルカリ → 塩＋水</div><p>H⁺＋OH⁻→H₂O</p><div class="trend"><b>入試：</b>イオン数の変化グラフ。</div>`]},{id:'genetics',g:3,f:'生物',i:'🧬',t:'遺伝と進化',d:'細胞分裂、生殖、遺伝',b:[`<h2>細胞分裂</h2><p>染色体が複製され、同じ遺伝情報が娘細胞へ分配される。</p>`,`<h2>生殖</h2><p>有性生殖では減数分裂で生殖細胞をつくり、受精で染色体数が戻る。</p>`,`<h2>遺伝</h2><p>顕性形質と潜性形質。組合せを表で整理する。</p><div class="trend"><b>入試：</b>比の計算と考察記述。</div>`]},{id:'space',g:3,f:'地学',i:'🌌',t:'地球と宇宙',d:'天体、日周運動、季節',b:[`<h2>日周運動</h2><p>地球の自転により、天体は東から西へ動いて見える。</p>`,`<h2>年周運動と季節</h2><p>地軸が傾いたまま公転するため、南中高度と昼の長さが変化する。</p>`,`<h2>月と惑星</h2><p>月の満ち欠けは太陽・地球・月の位置関係で決まる。</p><div class="trend"><b>入試：</b>方位・時刻・見え方の総合問題。</div>`]}];const Q=[['light','反射角を測る基準は？',['鏡面','法線','入射光','水平線'],1,'角度は鏡に垂直な法線から測る。','確認'],['light','音の高さを決めるものは？',['振幅','振動数','音速','距離'],1,'振動数が大きいほど高い音。','確認'],['matter','質量54g、体積20cm³の密度は？',['0.37','2.7','34','74'],1,'54÷20＝2.7g/cm³。','計算'],['matter','状態変化で変わらないものは？',['体積','形','質量','密度'],2,'閉じた系では質量は保存される。','確認'],['plants','受粉後、胚珠は何になる？',['果実','種子','子房','花粉'],1,'胚珠→種子、子房→果実。','確認'],['plants','対照実験を行う目的は？',['時間短縮','条件を1つだけ比較','温度上昇','色を濃くする'],1,'調べたい条件以外を同じにして影響を確かめる。','入試'],['earth1','初期微動を起こす波は？',['S波','P波','表面波','津波'],1,'速いP波が初期微動を起こす。','確認'],['earth1','年代を知る化石は？',['示相化石','示準化石','生痕化石','微化石'],1,'示準化石は年代、示相化石は環境。','確認'],['current','6Vで2A流れる抵抗は？',['3Ω','4Ω','8Ω','12Ω'],0,'R＝V÷I＝3Ω。','計算'],['current','100Wを30秒使った電力量は？',['130J','300J','3000J','30000J'],2,'100×30＝3000J。','計算'],['chem','化学変化で保存されるものは？',['分子の組合せ','原子の種類と数','色','体積'],1,'原子の組合せは変わるが種類と数は保存。','確認'],['chem','密閉容器で反応前20gなら反応後は？',['10g','20g','30g','条件不足'],1,'質量保存の法則。','確認'],['body','酸素を運ぶ血球は？',['白血球','赤血球','血小板','リンパ球'],1,'赤血球中のヘモグロビンが運ぶ。','確認'],['body','尿素をこし取る器官は？',['肺','肝臓','腎臓','小腸'],2,'腎臓で血液から尿素などをこし取る。','確認'],['weather','実際8.6g、飽和17.2gの湿度は？',['25%','50%','75%','200%'],1,'8.6÷17.2×100＝50%。','計算'],['weather','寒冷前線付近の典型的な雨は？',['広く弱い','狭く強い','降らない','雪のみ'],1,'積乱雲が発達し短時間に強い雨。','入試'],['motion','10Nで3m動かした仕事は？',['3J','13J','30J','300J'],2,'10×3＝30J。','計算'],['motion','つり合う2力の条件で誤りは？',['一直線上','反対向き','同じ大きさ','同じ向き'],3,'向きは反対。','確認'],['ion','陽イオンになるとき原子は？',['電子を失う','電子を得る','陽子を失う','中性子を得る'],0,'電子を失うと正に帯電。','確認'],['ion','中和でできるものは？',['塩と水','酸素と水素','金属と水','酸だけ'],0,'酸＋アルカリ→塩＋水。','確認'],['genetics','有性生殖で生殖細胞をつくる分裂は？',['体細胞分裂','減数分裂','二分裂','出芽'],1,'減数分裂で染色体数が半分になる。','確認'],['genetics','顕性Aa×Aaで潜性aaの割合は？',['1/4','1/2','3/4','全部'],0,'AA:Aa:aa＝1:2:1。','入試'],['space','星が東から西へ動いて見える主因は？',['公転','自転','月の引力','太陽風'],1,'地球が西から東へ自転するため。','確認'],['space','季節で南中高度が変わる主因は？',['地球と太陽の距離','地軸の傾きと公転','月の満ち欠け','自転速度'],1,'地軸が傾いたまま公転するため。','入試']];let state=JSON.parse(localStorage.getItem('scienceWB2')||'{"learned":[],"ok":0,"all":0,"weak":[]}'),unit=null,bi=0,queue=[],qi=0,score=0,answered=false;const save=()=>localStorage.setItem('scienceWB2',JSON.stringify(state));function show(id,tab){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');if(tab){document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));tab.classList.add('active')}if(id==='home'){renderUnits();stats()}}function stats(){learned.textContent=state.learned.length;correctRate.textContent=state.all?Math.round(state.ok/state.all*100)+'%':'0%';weakCount.textContent=state.weak.length}function filters(){const a=['全部','中1','中2','中3','物理','化学','生物','地学'];filters.innerHTML='';a.forEach((x,n)=>{let b=document.createElement('button');b.className='chip'+(n===0?' active':'');b.textContent=x;b.onclick=()=>{document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));b.classList.add('active');renderUnits(x)};filters.appendChild(b)})}function renderUnits(f='全部'){units.innerHTML='';U.filter(u=>f==='全部'||f==='中'+u.g||f===u.f).forEach(u=>{let p=state.learned.includes(u.id)?100:0,b=document.createElement('button');b.className='unit';b.innerHTML=`<span class="icon">${u.i}</span><h3>${u.t}</h3><p>${u.d}</p><small>ホワイトボード 3枚</small><div class="bar"><i style="width:${p}%"></i></div>`;b.onclick=()=>openLesson(u.id);units.appendChild(b)})}function openLesson(id){unit=U.find(x=>x.id===id);bi=0;drawBoard();show('lesson')}function drawBoard(){board.innerHTML=unit.b[bi];dots.innerHTML=unit.b.map((_,n)=>`<i class="dot ${n===bi?'active':''}"></i>`).join('')}function prevBoard(){bi=(bi+unit.b.length-1)%unit.b.length;drawBoard()}function nextBoard(){bi=(bi+1)%unit.b.length;drawBoard()}function markLearned(){if(!state.learned.includes(unit.id))state.learned.push(unit.id);save();alert('学習済みにしました')}function startUnitQuiz(){start(Q.filter(q=>q[0]===unit.id),'単元テスト')}function startExam(tab){start([...Q].sort(()=>Math.random()-.5).slice(0,10),'高校入試ミックス');if(tab){document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));tab.classList.add('active')}}function startWeak(tab){let a=Q.filter(q=>state.weak.includes(Q.indexOf(q)));start(a.length?a:[...Q].sort(()=>Math.random()-.5).slice(0,5),'苦手復習');if(tab){document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));tab.classList.add('active')}}function startRandomLesson(){openLesson(U[Math.floor(Math.random()*U.length)].id)}function start(a,t){queue=a;qi=0;score=0;quizBox.style.display='block';result.style.display='none';show('quiz');renderQ(t)}function renderQ(t){answered=false;next.style.display='none';explain.style.display='none';let q=queue[qi];qType.textContent=t+'・'+q[6];qCount.textContent=`${qi+1}/${queue.length}`;question.textContent=q[1];choices.innerHTML='';q[2].forEach((c,n)=>{let b=document.createElement('button');b.className='choice';b.textContent=c;b.onclick=()=>answer(n,b);choices.appendChild(b)})}function answer(n,b){if(answered)return;answered=true;let q=queue[qi],idx=Q.indexOf(q),ok=n===q[3];state.all++;if(ok){state.ok++;score++;b.classList.add('correct');state.weak=state.weak.filter(x=>x!==idx)}else{b.classList.add('wrong');choices.children[q[3]].classList.add('correct');if(!state.weak.includes(idx))state.weak.push(idx)}save();explain.textContent=(ok?'正解！ ':'不正解。 ')+q[5];explain.style.display='block';next.style.display='block';stats()}function nextQuestion(){qi++;if(qi>=queue.length){quizBox.style.display='none';result.style.display='block';let r=Math.round(score/queue.length*100);scoreText.textContent=r+'%';resultMsg.textContent=r>=80?'入試でも戦える仕上がり！':r>=60?'あと少し。間違いを復習しよう。':'ホワイトボードに戻って要点を確認しよう。';return}renderQ(qType.textContent.split('・')[0])}filters();renderUnits();stats();</script></body></html>
