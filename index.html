<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>My Apps</title>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#f8fafc;background:#0f172a}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100dvh;background:linear-gradient(180deg,#0f172a,#111827)}main{width:min(100%,720px);margin:auto;padding:max(24px,env(safe-area-inset-top)) 18px max(32px,env(safe-area-inset-bottom))}header{display:flex;justify-content:space-between;align-items:end;margin-bottom:24px}h1{margin:0;font-size:34px;letter-spacing:-.04em}.sub{margin:6px 0 0;color:#94a3b8}.version{font-size:12px;color:#94a3b8}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{display:block;padding:18px;border:1px solid #334155;border-radius:20px;background:#1e293b;color:inherit;text-decoration:none;box-shadow:0 10px 25px rgba(0,0,0,.18);transition:.15s}.card:active{transform:scale(.98)}.icon{display:grid;place-items:center;width:56px;height:56px;border-radius:16px;background:#2563eb;font-size:25px;font-weight:900}.card h2{margin:16px 0 6px;font-size:20px}.card p{margin:0;color:#94a3b8;line-height:1.55;font-size:14px}.tag{display:inline-block;margin-top:14px;padding:5px 9px;border-radius:999px;background:#0f172a;color:#bfdbfe;font-size:12px;font-weight:700}
  </style>
</head>
<body>
  <main>
    <header><div><h1>MY APPS</h1><p class="sub">作ったゲームと便利アプリ</p></div><span class="version">v1.0.0</span></header>
    <section class="grid">
      <a class="card" href="./number-tap-25/">
        <span class="icon">25</span>
        <h2>1→25 TAP</h2>
        <p>1から25まで順番にタップして、クリアタイムを競うスピードゲーム。</p>
        <span class="tag">PLAY</span>
      </a>
    </section>
  </main>
</body>
</html>
