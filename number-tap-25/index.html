<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="NUMBER TAP" />
  <title>NUMBER TAP</title>
  <link rel="manifest" href="manifest.webmanifest?v=1.2.3" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css?v=1.2.3" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div><p class="eyebrow">NUMBER SPEED GAME</p><h1>NUMBER TAP</h1></div>
      <span class="version">v1.2.3</span>
    </header>

    <section class="size-panel" aria-label="盤面サイズ設定">
      <span>マス数</span>
      <div class="size-controls">
        <button id="sizeDown" type="button" aria-label="マス数を減らす">−</button>
        <strong id="sizeLabel">5×5</strong>
        <button id="sizeUp" type="button" aria-label="マス数を増やす">＋</button>
      </div>
      <small id="totalLabel">1〜25</small>
    </section>

    <section class="mode-panel" aria-label="難易度設定">
      <div class="mode-heading"><strong>追加ルール</strong><span id="modeName">NORMAL</span></div>
      <label><input id="fillMode" type="checkbox" /> 消えた穴を詰める</label>
      <label><input id="rotateMode" type="checkbox" /> 5回ごとに盤面回転</label>
      <label><input id="moveMode" type="checkbox" /> タップごとに数字移動</label>
    </section>

    <section class="stats" aria-label="ゲーム状況">
      <div class="stat"><span>TIME</span><strong id="time">0.00</strong><small>秒</small></div>
      <div class="stat"><span>NEXT</span><strong id="next">1</strong><small id="progress">0 / 25</small></div>
      <div class="stat"><span>BEST</span><strong id="best">--</strong><small>条件別</small></div>
    </section>

    <p id="message" class="message" aria-live="polite">サイズとルールを選んでスタート！</p>
    <div id="gridWrap" class="grid-wrap"><section id="grid" class="number-grid" aria-label="数字ボタン"></section></div>
    <div class="actions" style="grid-template-columns:1.3fr 1fr 1fr">
      <button id="start" class="primary" type="button">スタート</button>
      <button id="resetGame" class="secondary" type="button">リセット</button>
      <button id="resetBest" class="secondary" type="button">ベスト削除</button>
    </div>
    <p class="rule">リセットすると途中の記録を破棄して、設定画面へ戻ります。</p>
  </main>
  <script src="app-v123.js?v=1.2.3"></script>
</body>
</html>
